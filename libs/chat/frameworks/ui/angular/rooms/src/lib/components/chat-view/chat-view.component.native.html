<div *ngIf="chatPageView" class="display-flex padding-12 card-border">

  <div class="margin-12 padding-12 card-border">
    <h2>{{ chatPageView.activeUser.name }}</h2>
    <ul>
      <li class="padding-12 cursor-pointer" *ngFor="let chatRoom of chatPageView.rooms" [value]="chatRoom"
        (click)="selectRoom.emit(chatRoom)">
        <b>{{ chatRoom.name }}</b>
      </li>
    </ul>
  </div>

  <div class="margin-12" *ngIf="chatPageView.activeRoom.name">

    <div>
      <p><b>{{ chatPageView.activeRoom.name }}</b></p>
      <p>{{chatPageView.activeRoom.participantNames}}</p>
      <br>
      <div *ngFor="let message of chatPageView.activeRoomMessages">
        <p> <b>{{ message.participantName }}</b>: {{ message.content }}</p>
      </div>
    </div>

    <div class="display-flex">
      <input class="padding-vertical-4" #messageInput matInput />
      <button class="send-button" (click)="sendMessage.emit(messageInput.value);messageInput.value=''">
        Send
      </button>
    </div>

  </div>
</div>
